name: Build Pegasus Frontend (Android & Windows)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtcharts qtmultimedia qtsvg'
    
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2
    
    - name: Install dependencies
      run: |
        choco install sdl2 -y
    
    - name: Build
      run: |
        mkdir build
        cd build
        qmake ..
        nmake
      shell: cmd
    
    - name: Package
      run: |
        cd build
        windeployqt src/app/release/Pegasus.exe --dir Pegasus-Windows
        copy src/app/release/Pegasus.exe Pegasus-Windows/
        7z a Pegasus-frontend-Windows.zip Pegasus-Windows
      shell: cmd
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Pegasus-Windows
        path: build/Pegasus-frontend-Windows.zip

  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-11-jdk
    
    - name: Install Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Qt for Android
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'linux'
        target: 'android'
        arch: 'android_arm64_v8a'
        modules: 'qtcharts qtmultimedia qtsvg'
    
    - name: Install Android NDK
      run: |
        sdkmanager "ndk;21.4.7075529"
    
    - name: Build
      run: |
        export ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/21.4.7075529
        mkdir build
        cd build
        qmake .. \
          -spec android-clang \
          CONFIG+=release \
          ANDROID_ABIS=arm64-v8a
        make -j$(nproc)
        make install INSTALL_ROOT=android_build
    
    - name: Package APK
      run: |
        cd build
        androiddeployqt \
          --input android_deployment_settings.json \
          --output android_build \
          --android-platform android-30 \
          --gradle \
          --release
        cp android_build/build/outputs/apk/release/android_build-release-unsigned.apk Pegasus-frontend-Android.apk
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Pegasus-Android
        path: build/Pegasus-frontend-Android.apk

  build-android-qt6:
    runs-on: ubuntu-latest
    name: Build Android (Qt6)
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk
    
    - name: Install Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Qt6 for Android
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        host: 'linux'
        target: 'android'
        arch: 'android_arm64_v8a'
        modules: 'qtcharts qtmultimedia qtsvg'
    
    - name: Install Android NDK
      run: |
        sdkmanager "ndk;25.2.9519653"
    
    - name: Build with Qt6
      run: |
        export ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.2.9519653
        mkdir build-qt6
        cd build-qt6
        qmake6 .. \
          -spec android-clang \
          CONFIG+=release \
          ANDROID_ABIS=arm64-v8a
        make -j$(nproc)
        make install INSTALL_ROOT=android_build
    
    - name: Package APK (Qt6)
      run: |
        cd build-qt6
        androiddeployqt \
          --input android_deployment_settings.json \
          --output android_build \
          --android-platform android-33 \
          --gradle \
          --release
        cp android_build/build/outputs/apk/release/android_build-release-unsigned.apk Pegasus-frontend-Android-Qt6.apk
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Pegasus-Android-Qt6
        path: build-qt6/Pegasus-frontend-Android-Qt6.apk
