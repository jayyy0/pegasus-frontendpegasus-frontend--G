name: Build Pegasus Frontend (Android & Windows)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2019
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Qt6
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtcharts qtmultimedia qtsvg'
        setup-python: 'false'
    
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2
    
    - name: Install dependencies
      run: |
        choco install sdl2 -y
    
    - name: Build
      run: |
        mkdir build
        cd build
        qmake6 ..
        nmake
      shell: cmd
    
    - name: Package
      run: |
        cd build
        windeployqt6 src/app/release/Pegasus.exe --dir Pegasus-Windows
        copy src/app/release/Pegasus.exe Pegasus-Windows/
        7z a Pegasus-frontend-Windows-Qt6.zip Pegasus-Windows
      shell: cmd
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Pegasus-Windows-Qt6
        path: build/Pegasus-frontend-Windows-Qt6.zip

  build-android-qt6:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk
    
    - name: Install Qt6 for Android
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        host: 'linux'
        target: 'android'
        arch: 'android_arm64_v8a'
        modules: 'qtcharts qtmultimedia qtsvg'
        setup-python: 'false'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Android NDK
      run: |
        sdkmanager "ndk;25.2.9519653"
    
    - name: Build
      run: |
        export ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.2.9519653
        export QT_HOST_PATH=$Qt6_DIR
        mkdir build
        cd build
        $Qt6_DIR/bin/qt-cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-33
        cmake --build . --parallel
    
    - name: Package APK
      run: |
        cd build
        $Qt6_DIR/bin/androiddeployqt \
          --input android_deployment_settings.json \
          --output android_build \
          --android-platform android-33 \
          --gradle \
          --release
        cp android_build/build/outputs/apk/release/android_build-release-unsigned.apk Pegasus-frontend-Android-Qt6.apk
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Pegasus-Android-Qt6
        path: build/Pegasus-frontend-Android-Qt6.apk
